name: Feature request
description: Suggest a new capability or improvement for blurkit.
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please keep the request concrete and outcome-focused.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: I need to ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What change would you like to see?
      placeholder: Add an API that ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds did you try, and why are they not enough?
  - type: dropdown
    id: impact
    attributes:
      label: Impact area
      options:
        - Runtime behavior
        - API/types
        - CLI
        - Docs/examples
        - Tooling/workflows
        - Other
    validations:
      required: true
